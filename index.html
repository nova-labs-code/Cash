async function load(){

    const res = await fetch(url, {
        headers:{
            "x-api-key": API_KEY
        }
    });

    const data = await res.json();

    const players = (data.data || []).map(p => {
        return {
            userId: p.key,
            time: p.value
        };
    });

    players.sort((a,b)=>b.time-a.time);

    document.getElementById("board").innerHTML =
    players.map((p,i)=>`
        <tr>
            <td>#${i+1}</td>
            <td>${p.userId}</td>
            <td>${(p.time/3600).toFixed(2)}</td>
        </tr>
    `).join("");
}
