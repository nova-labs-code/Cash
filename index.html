<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playtime Leaderboard</title>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

.container{
    max-width:800px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:15px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111a2e;
    border-radius:10px;
    overflow:hidden;
}

th, td{
    padding:12px;
    border-bottom:1px solid #1f2a44;
}

th{
    background:#16213a;
}

tr:hover{
    background:#1a2742;
}

.rank{
    color:#4ea1ff;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Playtime Leaderboard</h1>

<input id="search" placeholder="Search player..." oninput="render()">

<table>
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Hours</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

</div>

<script>

const URL =
"https://raw.githubusercontent.com/nova-labs-code/Cash/main/players.json";

let players = [];

async function load(){

    try{

        const res = await fetch(URL + "?t=" + Date.now());
        const data = await res.json();

        players = Object.values(data.players || {});

        render();

    }catch(err){
        console.log("Failed to load:", err);
    }
}

function render(){

    const q =
        document.getElementById("search")
        .value.toLowerCase();

    let list = players.filter(p =>
        p.username.toLowerCase().includes(q)
    );

    list.sort((a,b)=>b.time - a.time);

    document.getElementById("board").innerHTML =
        list.map((p,i)=>`
            <tr>
                <td class="rank">#${i+1}</td>
                <td>${p.username}</td>
                <td>${(p.time/3600).toFixed(2)}h</td>
            </tr>
        `).join("");

}

load();
setInterval(load, 30000);

</script>

</body>
</html>
